<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra Form bằng JavaScript</title>
</head>
<body>

    <form onsubmit="return validate()" method="post">
        Nhập số: <input type="text" name="num1" id="num1" />
        <br />
        Lặp lại: <input type="text" name="num2" id="num2" />
        <br />
        <input type="submit" value="Submit" />
    </form>

    <script>
        function validate() {
          
            var n1 = document.getElementById("num1");
            var n2 = document.getElementById("num2");

            
            if (n1.value != "" && n2.value != "") {
                
                // Bước 3: Kiểm tra giá trị phải khác nhau như yêu cầu đề bài
                if (n1.value != n2.value) {
                    return true; // Hợp lệ, cho phép form gửi đi
                }
            }
            
            // Bước 4: Nếu bị rỗng hoặc giá trị giống nhau thì hiện thông báo và chặn submit
            alert("Dữ liệu không được để trống, không được giống nhau");
            return false; 
        }
    </script>

</body>
</html>
