<!DOCTYPE html>
<html>
<head>
    <title>Bài tập JavaScript 22</title>
    <meta charset="utf-8">
</head>
<body style="font-family:arial; padding: 20px;">

    <input type="button" value="Gửi" 
           onmousemove="window.status='Bạn đang di chuyển chuột vào nút'; return true;">

    <input type="text" name="HoTen" placeholder="Nhập họ tên"
           onmousemove="window.status='Bạn đang di chuyển chuột vào textbox'; return true;">
    <br><br>

    Giới tính: 
    <input type="radio" name="GioiTinh" 
           onmousemove="window.status='Bạn đang di chuyển chuột vào lựa chọn Nam'; return true;"> Nam
           
    <input type="radio" name="GioiTinh" 
           onmousemove="window.status='Bạn đang di chuyển chuột vào lựa chọn Nữ'; return true;"> Nữ

</body>
</html>
