<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bài tập JavaScript 15</title>
</head>

<body>
    <h2>Hãy nhập hai số và click vào nút Tính tổng</h2>

    <input type="text" name="SoHang1"> +
    <input type="text" name="SoHang2"> =
    <input type="text" name="KetQua">

    <br><br>

    <input type="button" name="TinhTong" value="Tính tổng"
        onclick="
        KetQua.value = parseFloat(SoHang1.value) + parseFloat(SoHang2.value);
        ">
</body>
</html>
