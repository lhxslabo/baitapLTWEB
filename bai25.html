<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Vinaphone</title>
</head>

<body style="font-family: Arial">
    <h2>Đăng nhập vào hệ thống Vinaphone</h2>
    <hr>

    <form action="https://vinaphone.com.vn/login" method="post">
        
        User Name: <br>
        <input type="text" name="username" size="20"><br><br>

        Password: <br>
        <input type="password" name="password" size="20"><br><br>

        <!-- Thông tin phụ (ẩn) -->
        <input type="hidden" name="id" value="0">
        <input type="hidden" name="language" value="vi">

        <input type="submit" value="Đăng nhập - Login">
    </form>

</body>
</html>
