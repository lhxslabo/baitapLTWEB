<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div class="card p-4 shadow-sm" style="max-width: 500px; margin: auto">
        <h4 class="text-center mb-3">Các loại kem trong cửa hàng:</h4>

        <div class="form-check">
          <input
            type="checkbox"
            value="Kem que"
            name="kem"
            class="form-check-input"
          />
          <label class="form-check-label">Kem que</label>
        </div>

        <div class="form-check">
          <input
            type="checkbox"
            value="Kem dau"
            name="kem"
            class="form-check-input"
          />
          <label class="form-check-label">Kem dâu</label>
        </div>

        <div class="form-check">
          <input
            type="checkbox"
            value="Kem bơ"
            name="kem"
            class="form-check-input"
          />
          <label class="form-check-label">Kem bơ</label>
        </div>

        <div class="form-check">
          <input
            type="checkbox"
            value="Kem vani"
            name="kem"
            class="form-check-input"
          />
          <label class="form-check-label">Kem vani</label>
        </div>

        <input
          type="button"
          onclick="chonKem()"
          value="Chọn kem"
          class="btn btn-primary mt-3 w-100"
        />

        <h4 id="kemDaChon" class="mt-3 text-success"></h4>
      </div>
    </div>
  </body>
</html>
